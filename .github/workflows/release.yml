name: Release QGIS Plugin

on:
  push:
    tags:
      - '*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get install zip -y

      - name: Build plugin zip
        run: |
          mkdir -p IGN_vueZ
          rsync -av --progress . IGN_vueZ/ \
            --exclude .git \
            --exclude .github \
            --exclude IGN_vueZ
          zip -r IGN_vueZ.zip IGN_vueZ

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "IGN_vueZ.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}